name: Daily Build

on:
  schedule:
    # Run at 12:05 AM UTC every day
    - cron: '5 0 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  trigger-netlify-build:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify Build Hook
        run: |
          curl -X POST -d {} ${{ secrets.NETLIFY_BUILD_HOOK }}